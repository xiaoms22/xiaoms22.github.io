linkLabel = "查看 SO-ARM101 详情"
tags = ["99 episodes", "约2.8万帧", "真实机器人", "rollout评测"]
content = """
**Role：** 负责 SO-ARM101 pickup-and-putdown 任务的数据采集、LeRobot 风格数据组织、模型训练/部署验证和失败归因。

**Pipeline：** 遥操作采集 -> LeRobotDataset -> ACT/Diffusion Policy/SmolVLA 训练 -> OpenPI/pi0/pi0.5 推理接入 -> 真机 rollout。

**Evidence：** 公开仓库 [xiaoms22/soarm101](https://github.com/xiaoms22/soarm101)，以及 99 episodes / 约 2.8 万帧、三类模型 rollout 和 pi0/pi0.5 小样本部署验证口径。

**Boundary：** pi0/pi0.5 是部署验证和小样本评测，不包装成从零训练通用机器人基座模型。

**Next：** 扩展物体、位置、光照、相机视角和语言指令改写评测，形成更标准的泛化测试表。
"""

