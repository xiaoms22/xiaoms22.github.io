  <rect x="88" y="342" width="1002" height="88" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="122" y="378" fill="#0F172A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Public boundary</text>
  <text x="122" y="410" fill="#475569" font-family="Arial, sans-serif" font-size="17">Only the prototype pipeline is described. Internal files, raw project code, data, and partner materials are not uploaded.</text>
