<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SO-ARM101 pipeline</title>
  <desc id="desc">A safe public diagram showing the SO-ARM101 data, training, deployment, and evaluation loop.</desc>
  <rect width="1200" height="560" rx="28" fill="#F8FAFC"/>
  <rect x="34" y="34" width="1132" height="492" rx="24" fill="white" stroke="#D9E2EC"/>
  <text x="70" y="92" fill="#0F172A" font-family="Arial, sans-serif" font-size="34" font-weight="700">SO-ARM101 VLA Real-Robot Loop</text>
  <text x="72" y="128" fill="#475569" font-family="Arial, sans-serif" font-size="18">Teleoperation data -> LeRobotDataset -> policy training -> inference integration -> rollout & failure analysis</text>
  <g font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="72" y="205" width="178" height="92" rx="18" fill="#E0F2FE" stroke="#0284C7"/>
    <text x="104" y="242" fill="#075985">Teleoperation</text>
    <text x="116" y="271" fill="#075985" font-size="15" font-weight="500">99 episodes</text>
    <rect x="306" y="205" width="178" height="92" rx="18" fill="#ECFDF5" stroke="#059669"/>
    <text x="338" y="242" fill="#065F46">LeRobotDataset</text>
    <text x="354" y="271" fill="#065F46" font-size="15" font-weight="500">~28k frames</text>
    <rect x="540" y="205" width="178" height="92" rx="18" fill="#FEF3C7" stroke="#D97706"/>
    <text x="589" y="242" fill="#92400E">Training</text>
    <text x="574" y="271" fill="#92400E" font-size="15" font-weight="500">ACT / DP / SmolVLA</text>
    <rect x="774" y="205" width="178" height="92" rx="18" fill="#FCE7F3" stroke="#DB2777"/>
    <text x="824" y="242" fill="#9D174D">Deployment</text>
    <text x="821" y="271" fill="#9D174D" font-size="15" font-weight="500">OpenPI / pi0</text>
    <rect x="1008" y="205" width="106" height="92" rx="18" fill="#EEF2FF" stroke="#4F46E5"/>
    <text x="1032" y="242" fill="#3730A3">Rollout</text>
    <text x="1028" y="271" fill="#3730A3" font-size="15" font-weight="500">evaluate</text>
  </g>
  <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round">
    <path d="M250 251H306"/>
    <path d="M484 251H540"/>
    <path d="M718 251H774"/>
    <path d="M952 251H1008"/>
    <path d="M278 244L306 251L278 258"/>
    <path d="M512 244L540 251L512 258"/>
    <path d="M746 244L774 251L746 258"/>
    <path d="M980 244L1008 251L980 258"/>
  </g>
  <rect x="72" y="365" width="1042" height="84" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="104" y="402" fill="#0F172A" font-family="Arial, sans-serif" font-size="20" font-weight="700">Interview boundary</text>
  <text x="104" y="433" fill="#475569" font-family="Arial, sans-serif" font-size="17">pi0/pi0.5: deployment validation and small-sample evaluation, not from-scratch foundation-model training.</text>
</svg>
